<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniLearn Auth Test</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --border: #d1d5db;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(160deg, #eef6ff 0%, var(--bg) 45%, #effcf6 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 960px;
      margin: 24px auto;
      padding: 0 16px 32px;
    }
    h1 { margin: 0 0 16px; }
    p { color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 8px 0 4px;
    }
    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      font-size: 14px;
      background: #fff;
    }
    button {
      margin-top: 10px;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    .small { font-size: 12px; color: var(--muted); }
    pre {
      background: #0b1020;
      color: #d1d5db;
      border-radius: 10px;
      padding: 10px;
      min-height: 180px;
      overflow: auto;
      font-size: 12px;
    }
    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="wrap">
    <h1>UniLearn Auth Test Client</h1>
    <p>Use this to test account auth endpoints quickly. Start backend first.</p>

    <div class="card">
      <div class="row">
        <div>
          <label>Backend Base URL</label>
          <input id="baseUrl" value="http://127.0.0.1:8000" />
        </div>
        <div>
          <label>Google Client ID</label>
          <input id="googleClientId" placeholder="123...apps.googleusercontent.com" />
        </div>
      </div>
      <button id="initGoogle">Init Google Button</button>
      <div id="googleBtn" style="margin-top: 10px;"></div>
      <div class="small">Google button appears after init.</div>
    </div>

    <div class="grid" style="margin-top: 12px;">
      <div class="card">
        <h3>Register</h3>
        <label>Email</label>
        <input id="regEmail" value="user1@example.com" />
        <label>Full Name</label>
        <input id="regName" value="User One" />
        <label>Password</label>
        <input id="regPass" value="StrongPass123!" />
        <label>Role</label>
        <input id="regRole" value="student" />
        <button id="registerBtn">POST /api/accounts/register/</button>
      </div>

      <div class="card">
        <h3>Login</h3>
        <label>Email</label>
        <input id="loginEmail" value="user1@example.com" />
        <label>Password</label>
        <input id="loginPass" value="StrongPass123!" />
        <button id="loginBtn">POST /api/accounts/login/</button>
      </div>

      <div class="card">
        <h3>Verify Email</h3>
        <label>Token</label>
        <textarea id="verifyToken" rows="4" placeholder="paste token from terminal/email"></textarea>
        <button id="verifyBtn">POST /api/accounts/verify-email/</button>
      </div>

      <div class="card">
        <h3>Resend Verification</h3>
        <label>Email</label>
        <input id="resendEmail" value="user1@example.com" />
        <button id="resendBtn">POST /api/accounts/resend-verification/</button>
      </div>

      <div class="card">
        <h3>Me (Protected)</h3>
        <label>Access Token</label>
        <textarea id="accessToken" rows="4" placeholder="login response access token"></textarea>
        <button id="meBtn">GET /api/accounts/me/</button>
      </div>

      <div class="card">
        <h3>Refresh</h3>
        <label>Refresh Token</label>
        <textarea id="refreshToken" rows="4" placeholder="login response refresh token"></textarea>
        <button id="refreshBtn">POST /api/accounts/refresh/</button>
      </div>
    </div>

    <div class="card" style="margin-top: 12px;">
      <h3>Response</h3>
      <pre id="out">Ready.</pre>
    </div>
  </div>

  <script>
    const out = document.getElementById('out');

    function base() {
      return document.getElementById('baseUrl').value.replace(/\/$/, '');
    }

    function print(label, data) {
      out.textContent = `[${new Date().toISOString()}] ${label}\n${JSON.stringify(data, null, 2)}`;
    }

    async function api(path, method, body, token) {
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers.Authorization = `Bearer ${token}`;

      const res = await fetch(`${base()}${path}`, {
        method,
        headers,
        body: body ? JSON.stringify(body) : undefined,
      });

      let json;
      try {
        json = await res.json();
      } catch {
        json = { raw: await res.text() };
      }

      print(`${method} ${path} -> ${res.status}`, json);
      return { res, json };
    }

    document.getElementById('registerBtn').onclick = () => api('/api/accounts/register/', 'POST', {
      email: document.getElementById('regEmail').value,
      full_name: document.getElementById('regName').value,
      password: document.getElementById('regPass').value,
      role: document.getElementById('regRole').value,
    });

    document.getElementById('loginBtn').onclick = async () => {
      const { json } = await api('/api/accounts/login/', 'POST', {
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPass').value,
      });
      if (json.access) document.getElementById('accessToken').value = json.access;
      if (json.refresh) document.getElementById('refreshToken').value = json.refresh;
    };

    document.getElementById('verifyBtn').onclick = () => api('/api/accounts/verify-email/', 'POST', {
      token: document.getElementById('verifyToken').value.trim(),
    });

    document.getElementById('resendBtn').onclick = () => api('/api/accounts/resend-verification/', 'POST', {
      email: document.getElementById('resendEmail').value,
    });

    document.getElementById('meBtn').onclick = () => api(
      '/api/accounts/me/',
      'GET',
      null,
      document.getElementById('accessToken').value.trim()
    );

    document.getElementById('refreshBtn').onclick = () => api('/api/accounts/refresh/', 'POST', {
      refresh: document.getElementById('refreshToken').value.trim(),
    });

    document.getElementById('initGoogle').onclick = () => {
      const clientId = document.getElementById('googleClientId').value.trim();
      if (!clientId) {
        print('Init Google', { error: 'Google Client ID is required' });
        return;
      }
      if (!window.google || !google.accounts || !google.accounts.id) {
        print('Init Google', { error: 'Google script not loaded yet' });
        return;
      }

      google.accounts.id.initialize({
        client_id: clientId,
        callback: async (response) => {
          const { json } = await api('/api/accounts/google/', 'POST', {
            id_token: response.credential,
          });
          if (json.access) document.getElementById('accessToken').value = json.access;
          if (json.refresh) document.getElementById('refreshToken').value = json.refresh;
        }
      });

      const btn = document.getElementById('googleBtn');
      btn.innerHTML = '';
      google.accounts.id.renderButton(btn, {
        theme: 'outline',
        size: 'large',
        type: 'standard',
        text: 'continue_with',
      });

      print('Init Google', { ok: true });
    };
  </script>
</body>
</html>
